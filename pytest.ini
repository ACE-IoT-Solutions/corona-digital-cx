[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# addopts = -v --cov=src --cov-report=html --cov-report=term-missing

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for complete workflows
    validation: Tests that validate project requirements
    slow: Tests that take significant time to run
    requires_git: Tests that require git repository

# Ignore paths
norecursedirs = .git .tox dist build *.egg node_modules

# Minimum Python version
minversion = 3.13

# Console output format
console_output_style = progress

# Timeout for tests (optional, requires pytest-timeout)
# timeout = 300

# Parallel execution (optional, requires pytest-xdist)
# addopts = -n auto
